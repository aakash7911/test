<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobPortal | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0f172a; color: #f8fafc; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 250px; height: 100vh; background: #1e293b; padding: 30px 20px; border-right: 1px solid #334155; }
        .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 50px; font-weight: 700; color: #38bdf8; font-size: 1.2rem; }
        .logo-icon { width: 35px; height: 35px; background: #38bdf8; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #0f172a; }
        .nav-link { display: block; padding: 12px 15px; color: #cbd5e1; text-decoration: none; border-radius: 8px; margin-bottom: 10px; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: #38bdf8; color: #0f172a; font-weight: 600; }
        
        /* Main Content */
        .main-content { flex: 1; padding: 50px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header h1 { font-size: 2rem; font-weight: 700; }
        .logout-btn { padding: 10px 20px; background: transparent; border: 1px solid #ef4444; color: #ef4444; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .logout-btn:hover { background: #ef4444; color: white; }

        /* Profile Card */
        .profile-card { background: #1e293b; padding: 30px; border-radius: 16px; display: flex; align-items: center; gap: 30px; border: 1px solid #334155; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; background: #38bdf8; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; color: #0f172a; font-weight: bold; }
        .details h2 { font-size: 1.8rem; margin-bottom: 5px; }
        .details p { color: #94a3b8; font-size: 1rem; margin-bottom: 5px; }
        .badge { display: inline-block; padding: 5px 12px; background: rgba(56, 189, 248, 0.2); color: #38bdf8; border-radius: 20px; font-size: 0.85rem; margin-top: 10px; }

        /* Stats Container */
        .stats { display: flex; gap: 20px; margin-top: 30px; }
        .stat-box { flex: 1; background: #1e293b; padding: 25px; border-radius: 16px; border: 1px solid #334155; text-align: center; }
        .stat-box h3 { font-size: 2.5rem; color: #38bdf8; margin-bottom: 5px; }
        .stat-box p { color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">
            <div class="logo-icon">JP</div> JobPortal
        </div>
        <a href="#" class="nav-link active">Dashboard</a>
        <a href="#" class="nav-link">My Applications</a>
        <a href="#" class="nav-link">Saved Jobs</a>
        <a href="#" class="nav-link">Settings</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 id="welcomeText">Loading...</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="profile-card">
            <div class="avatar" id="userInitial">?</div>
            <div class="details">
                <h2 id="userName">Loading Name...</h2>
                <p id="userEmail">Loading Email...</p>
                <p id="userLocation">📍 Loading Location...</p>
                <div class="badge" id="userRole">Loading Role...</div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <h3 id="appliedJobs">0</h3>
                <p>Jobs Applied</p>
            </div>
            <div class="stat-box">
                <h3 id="profileViews">0</h3>
                <p>Profile Views</p>
            </div>
            <div class="stat-box">
                <h3 id="savedJobs">0</h3>
                <p>Saved Jobs</p>
            </div>
        </div>
    </div>

    <script>
        // Check if user is logged in
        const token = localStorage.getItem('userToken');
        if (!token) {
            window.location.href = 'index.html'; // Token nahi hai to wapas login par bhejo
        }

        // Fetch User Data from Backend
        async function fetchUserData() {
            try {
                const response = await fetch('http://localhost:3000/api/profile', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.success) {
                    const user = data.user;
                    // Update the UI with real data
                    document.getElementById('welcomeText').innerText = `Welcome, ${user.name.split(' ')[0]}! 👋`;
                    document.getElementById('userName').innerText = user.name;
                    document.getElementById('userEmail').innerText = user.email;
                    document.getElementById('userLocation').innerText = `📍 ${user.location}`;
                    document.getElementById('userRole').innerText = user.role;
                    document.getElementById('userInitial').innerText = user.name.charAt(0);
                    
                    document.getElementById('appliedJobs').innerText = user.stats.applied;
                    document.getElementById('profileViews').innerText = user.stats.views;
                    document.getElementById('savedJobs').innerText = user.stats.saved;
                } else {
                    logout(); // Agar token invalid hai
                }
            } catch (error) {
                console.error("Error fetching profile:", error);
            }
        }

        function logout() {
            localStorage.removeItem('userToken');
            window.location.href = 'index.html';
        }

        // Load data when page opens
        fetchUserData();
    </script>
</body>
</html>
