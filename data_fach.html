<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobGram | Payouts & Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #0a0a0a; color: #fafafa; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* --- Sidebar --- */
        .sidebar {
            width: 260px; background: #121212; border-right: 1px solid #262626;
            padding: 20px; display: flex; flex-direction: column; position: fixed; height: 100vh;
        }
        .brand { font-size: 1.4rem; font-weight: 700; color: #10b981; display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 15px;
            color: #a8a8a8; text-decoration: none; border-radius: 8px; margin-bottom: 5px;
            cursor: pointer; transition: 0.2s; font-weight: 500;
        }
        .nav-item:hover { background: #1a1a1a; color: #fff; }
        .nav-item.active { background: rgba(16, 185, 129, 0.1); color: #10b981; border-right: 3px solid #10b981; }

        /* --- Main Content --- */
        .main-content { margin-left: 260px; flex: 1; padding: 30px 40px; background: #000; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #262626; padding-bottom: 20px; }
        .header h1 { font-size: 1.8rem; font-weight: 600; }
        .admin-profile { display: flex; align-items: center; gap: 10px; }

        /* --- Data Tabs (New) --- */
        .data-tabs { display: flex; background: #121212; border-radius: 10px; padding: 5px; margin-bottom: 20px; width: 100%; max-width: 500px; border: 1px solid #262626; }
        .data-tab { flex: 1; text-align: center; padding: 12px; border-radius: 8px; color: #a8a8a8; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .data-tab.active { background: #10b981; color: #000; }

        /* --- Filter Bar --- */
        .filter-bar {
            display: flex; gap: 15px; background: #121212; padding: 20px; 
            border-radius: 12px; border: 1px solid #262626; margin-bottom: 20px;
            align-items: center; justify-content: space-between;
        }
        .filter-group { display: flex; gap: 15px; flex: 1; }
        .search-box {
            display: flex; align-items: center; background: #1a1a1a; border: 1px solid #333;
            padding: 8px 15px; border-radius: 8px; flex: 1; max-width: 300px;
        }
        .search-box input { background: transparent; border: none; outline: none; color: white; width: 100%; margin-left: 10px; }
        
        .btn-export { 
            background: #10b981; color: #000; padding: 10px 20px; border: none; 
            border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-export:hover { background: #059669; }

        /* --- Data Table --- */
        .table-wrapper { width: 100%; overflow-x: auto; background: #121212; border: 1px solid #262626; border-radius: 12px; min-height: 300px;}
        table { width: 100%; border-collapse: collapse; text-align: left; }
        thead { background: #1a1a1a; }
        th { padding: 18px 20px; color: #a8a8a8; font-weight: 500; border-bottom: 1px solid #333; font-size: 0.9rem; text-transform: uppercase; }
        td { padding: 15px 20px; border-bottom: 1px solid #262626; font-size: 0.95rem; vertical-align: middle; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .empty-state { text-align: center; padding: 50px; color: #a8a8a8; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; display: inline-block; }
        .badge.adhoc { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge.perm { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.3); }
        
        .status { font-weight: 600; font-size: 0.9rem; }
        .status.pending { color: #f59e0b; }
        .status.cleared { color: #10b981; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand"><i data-lucide="database"></i> Data Center</div>
        <div class="nav-item active"><i data-lucide="users"></i> Attendance & Payouts</div>
        <div style="margin-top: auto;">
            <a href="admin.html" class="nav-item" style="color: #38bdf8;">
                <i data-lucide="arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1>Bank Payouts & Billing</h1>
            <div class="admin-profile">
                <span style="color: #a8a8a8;">Super Admin</span>
                <i data-lucide="user-circle" size="30" color="#10b981"></i>
            </div>
        </header>

        <div class="data-tabs">
            <div class="data-tab active" onclick="switchPayoutType('Permanent', this)">Permanent Payouts</div>
            <div class="data-tab" onclick="switchPayoutType('Adhoc', this)">Adhoc Payouts</div>
        </div>

        <div class="filter-bar">
            <div class="filter-group">
                <div class="search-box">
                    <i data-lucide="search" size="18" color="#a8a8a8"></i>
                    <input type="text" id="searchInput" placeholder="Search by name or company..." onkeyup="renderTable()">
                </div>
            </div>
            <button class="btn-export" onclick="generateBankBillCSV()">
                <i data-lucide="download"></i> Download Bank Sheet
            </button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>User Name</th>
                        <th>Job Type</th>
                        <th>Present (Days/Shifts)</th>
                        <th>Total Payout</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="5" class="empty-state">Loading Real Data from Backend...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const BACKEND_URL = "https://faa-qep3.onrender.com"; 
        const token = localStorage.getItem('userToken');

        // Global variables
        let globalPayoutData = [];
        let currentViewType = 'Permanent'; // Default view is Permanent

        // --- SWITCH BETWEEN ADHOC AND PERMANENT ---
        function switchPayoutType(type, element) {
            // Update UI Tabs
            document.querySelectorAll('.data-tab').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            // Update state and re-render
            currentViewType = type;
            renderTable();
        }

        // --- FETCH REAL DATA FROM BACKEND ---
        async function loadPayoutData() {
            const tableBody = document.getElementById('tableBody');
            try {
                // Ye API call dono (Adhoc aur Permanent) ka mix data layegi backend se
                const response = await fetch(`${BACKEND_URL}/api/admin/payouts`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    if(data.success && data.payouts.length > 0) {
                        globalPayoutData = data.payouts;
                        renderTable();
                    } else {
                        tableBody.innerHTML = `<tr><td colspan="5" class="empty-state">No attendance or payout data found in database.</td></tr>`;
                    }
                } else {
                    tableBody.innerHTML = `<tr><td colspan="5" class="empty-state">Backend API (/api/admin/payouts) is not ready yet.</td></tr>`;
                }
            } catch (error) {
                console.error("Failed to fetch data:", error);
                // Temporary Fallback (Fake data for testing UI before backend is built)
                globalPayoutData = [
                    { name: "Rahul Singh", jobType: "Permanent", presentCount: "22 Days", calculatedSalary: 14500, status: "Cleared", bankAccount: "304500001", ifscCode: "SBIN0001", panNumber: "ABCDE1234F", aadharNumber: "1234 5678 9012", uanNumber: "100111222" },
                    { name: "Akash Dev", jobType: "Adhoc", presentCount: "4 Shifts (12 Hrs)", calculatedSalary: 2400, status: "Pending", bankAccount: "9876543210", ifscCode: "HDFC0002", panNumber: "QWERT9876X", aadharNumber: "9876 5432 1098", uanNumber: "200333444" },
                    { name: "Vikas Sharma", jobType: "Adhoc", presentCount: "2 Shifts (8 Hrs)", calculatedSalary: 800, status: "Pending", bankAccount: "1122334455", ifscCode: "ICIC0003", panNumber: "ZXCVB1122M", aadharNumber: "1111 2222 3333", uanNumber: "300555666" }
                ];
                renderTable();
                // Comment out the below line when backend is ready
                // tableBody.innerHTML = `<tr><td colspan="5" class="empty-state">Server is offline.</td></tr>`;
            }
        }

        // --- RENDER TABLE UI ---
        function renderTable() {
            const tableBody = document.getElementById('tableBody');
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            
            let html = '';
            
            // Filter by BOTH the active tab (Adhoc/Permanent) AND the Search box
            const filteredData = globalPayoutData.filter(user => 
                user.jobType === currentViewType && 
                user.name.toLowerCase().includes(searchQuery)
            );

            if(filteredData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="empty-state">No ${currentViewType} records found.</td></tr>`;
                return;
            }

            filteredData.forEach(user => {
                let badgeClass = user.jobType === 'Adhoc' ? 'adhoc' : 'perm';
                let statusClass = user.status === 'Pending' ? 'pending' : 'cleared';
                
                html += `
                    <tr>
                        <td style="font-weight: 600;">${user.name}</td>
                        <td><span class="badge ${badgeClass}">${user.jobType}</span></td>
                        <td>${user.presentCount}</td>
                        <td style="font-weight: 700; color: #10b981;">₹ ${user.calculatedSalary}</td>
                        <td class="status ${statusClass}">${user.status}</td>
                    </tr>
                `;
            });

            tableBody.innerHTML = html;
        }

        // --- GENERATE EXCEL (CSV) FOR BANK BILLING ---
        function generateBankBillCSV() {
            // Sirf current tab wala data export karna hai (Adhoc ya Permanent)
            const dataToExport = globalPayoutData.filter(user => user.jobType === currentViewType);

            if (dataToExport.length === 0) {
                alert(`No ${currentViewType} data available to export.`);
                return;
            }

            // CSV Headers
            let csvContent = "Name,Bank Account Number,IFSC Code,PAN Number,Aadhar Number,UAN Number,Job Type,Present Count,Total Payable Amount\n";

            // Loop through data
            dataToExport.forEach(user => {
                let row = [
                    `"${user.name || ''}"`,
                    `"${user.bankAccount || ''}"`,
                    `"${user.ifscCode || ''}"`,
                    `"${user.panNumber || ''}"`,
                    `"${user.aadharNumber || ''}"`,
                    `"${user.uanNumber || ''}"`,
                    `"${user.jobType || ''}"`,
                    `"${user.presentCount || ''}"`,
                    `"${user.calculatedSalary || '0'}"`
                ];
                csvContent += row.join(",") + "\n";
            });

            // Trigger Download
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `JobGram_${currentViewType}_BankBill_${new Date().toLocaleDateString()}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Initial Load
        loadPayoutData();

    </script>
</body>
</html>
